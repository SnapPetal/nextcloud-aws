name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd ~/nextcloud-aws || exit 1

            # Pull latest changes
            git pull origin main

            # Restart Netdata if any netdata/ configs changed (configs are symlinked into /etc/netdata/)
            git diff ORIG_HEAD HEAD --name-only | grep -q '^netdata/' && sudo systemctl restart netdata || true

            # Pull latest Docker images (only standard images, not custom-built ones)
            docker compose pull db redis clamav ente-postgres ente-museum ente-web vaultwarden personal-website

            # Generate museum.yaml from template + .env secrets
            ./scripts/generate-museum-yaml.sh

            # Build and restart containers (--pull always ensures base images are fresh)
            docker compose build --pull app
            docker compose up -d

            # Reload nginx to pick up any config changes (test first so a bad
            # config never takes down all virtual hosts)
            sudo nginx -t && sudo systemctl reload nginx

            # Clean up old images
            docker image prune -f

            # Show running containers
            docker compose ps

      - name: Health Check
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # Wait for containers to be healthy
            sleep 10

            # Check if all containers are running
            if [ $(docker compose -f ~/nextcloud-aws/docker-compose.yml ps -q | wc -l) -eq 9 ]; then
              echo "All containers are running successfully!"
            else
              echo "Warning: Some containers may not be running"
              docker compose -f ~/nextcloud-aws/docker-compose.yml ps
              exit 1
            fi
