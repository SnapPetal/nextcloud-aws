# Netdata alarm notification configuration
# https://learn.netdata.cloud/docs/alerting/notifications/agent-dispatched-notifications/awssns

###############################################################################
# AWS SNS

SEND_AWSSNS="YES"
DEFAULT_RECIPIENT_AWSSNS="${NETDATA_SNS_TOPIC_ARN}"

# AWS credentials are passed via environment variables in docker-compose.yml:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION

###############################################################################
# Disable other notification methods

SEND_EMAIL="NO"
SEND_SLACK="NO"
SEND_DISCORD="NO"
SEND_TELEGRAM="NO"
SEND_PUSHOVER="NO"
SEND_PUSHBULLET="NO"
SEND_TWILIO="NO"
SEND_HIPCHAT="NO"
SEND_MESSAGEBIRD="NO"
SEND_KAVENEGAR="NO"
SEND_PROWL="NO"
SEND_CUSTOM="NO"
