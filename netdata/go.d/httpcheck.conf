# Netdata httpcheck plugin — monitors HTTP endpoints for service uptime.
# Alerts fire automatically via health_alarm_notify.conf (AWS SNS).
# https://learn.netdata.cloud/docs/data-collection/synthetic-checks/httpcheck

jobs:
  - name: nextcloud
    url: https://cloud.thonbecker.biz/status.php
    status_accepted: [200]

  - name: ente_web
    url: https://photos.thonbecker.biz
    status_accepted: [200]

  - name: ente_api
    url: https://photos-api.thonbecker.biz/ping
    status_accepted: [200]

  - name: vaultwarden
    url: https://vault.thonbecker.biz
    status_accepted: [200]
