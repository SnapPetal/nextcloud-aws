# Netdata httpcheck plugin — monitors HTTP endpoints for service uptime.
# Alerts fire automatically via health_alarm_notify.conf (AWS SNS).
# https://learn.netdata.cloud/docs/data-collection/synthetic-checks/httpcheck

jobs:
  - name: nextcloud
    url: http://127.0.0.1:8080/status.php
    status_accepted: [200]

  - name: ente_web
    url: http://127.0.0.1:3000
    status_accepted: [200]

  - name: ente_api
    url: http://127.0.0.1:8082/ping
    status_accepted: [200]

  - name: vaultwarden
    url: http://127.0.0.1:3002
    status_accepted: [200]
